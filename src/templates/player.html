<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ filename }}</title>
    <style>
      body,
      html {
        height: 100%;
        margin: 0;
        background: black;
        overflow: hidden;
      }
      #outerContainer {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      #videoContainer {
        width: 300%;
        height: 100%;
        display: flex;
        transition: transform 0.5s ease;
      }
      .videoWrapper {
        width: 33.33%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #videoPlayer {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
    </style>
  </head>
  <body>
    <div id="outerContainer">
      <div id="videoContainer">
        <div class="videoWrapper" id="prevWrapper"></div>
        <div class="videoWrapper" id="currentWrapper">
          <video id="videoPlayer" controls autoplay>
            <p>Your browser doesn't support video playback.</p>
          </video>
        </div>
        <div class="videoWrapper" id="nextWrapper"></div>
      </div>
    </div>
    <script type="module">
      import { Deta } from "https://cdn.deta.space/js/deta@latest/deta.mjs";
      const deta = Deta("{{ deta_key }}");
      const drive = deta.Drive("{{ drive }}");
      let currentVideo = "{{ filename }}";
      let nextVideo = "{{ next_file }}";
      let preVideo = "{{ pre_file }}";
      let videoCache = {};

      const videoContainer = document.getElementById("videoContainer");
      const videoPlayer = document.getElementById("videoPlayer");

      async function fetchVideo(filename) {
        if (!videoCache[filename]) {
          try {
            const response = await drive.get(filename);
            const blob = new Blob([response]);
            videoCache[filename] = URL.createObjectURL(blob);
          } catch (error) {
            console.error("Error fetching video:", filename, error);
          }
        }
        return videoCache[filename];
      }

      async function initVideo(filename) {
        try {
          const videoUrl = await fetchVideo(filename);
          videoPlayer.src = videoUrl;
          videoPlayer.play();
        } catch (error) {
          console.error("Error:", error);
        }
      }

      async function renewVideo(filename) {
        const response = await fetch(`/{{ drive }}/${filename}?renew=true`);
        const data = await response.json();
        currentVideo = filename;
        nextVideo = data.next;
        preVideo = data.pre;

        if (nextVideo) fetchVideo(nextVideo);
        if (preVideo) fetchVideo(preVideo);
      }

      async function playNextVideo() {
        if (nextVideo) {
          await slideToNext();
          await initVideo(nextVideo);
          renewVideo(nextVideo);
        }
      }

      async function playPrevVideo() {
        if (preVideo) {
          await slideToPrev();
          await initVideo(preVideo);
          renewVideo(preVideo);
        }
      }

      function slideToNext() {
        return new Promise((resolve) => {
          videoContainer.style.transform = "translateX(-33.33%)";
          setTimeout(() => {
            videoContainer.style.transition = "none";
            videoContainer.style.transform = "translateX(0)";
            setTimeout(() => {
              videoContainer.style.transition = "transform 0.5s ease";
              resolve();
            }, 50);
          }, 500);
        });
      }

      function slideToPrev() {
        return new Promise((resolve) => {
          videoContainer.style.transform = "translateX(33.33%)";
          setTimeout(() => {
            videoContainer.style.transition = "none";
            videoContainer.style.transform = "translateX(0)";
            setTimeout(() => {
              videoContainer.style.transition = "transform 0.5s ease";
              resolve();
            }, 50);
          }, 500);
        });
      }

      initVideo(currentVideo);
      renewVideo(currentVideo);

      videoPlayer.addEventListener("ended", playNextVideo);

      let touchStart;
      document.addEventListener(
        "touchstart",
        (e) => (touchStart = e.changedTouches[0].screenX)
      );
      document.addEventListener("touchend", async (e) => {
        const touchEnd = e.changedTouches[0].screenX;
        if (touchEnd < touchStart - 50) {
          await playNextVideo();
        } else if (touchEnd > touchStart + 50) {
          await playPrevVideo();
        }
      });

      document.addEventListener("keydown", async (e) => {
        if (e.key === "ArrowLeft") {
          await playPrevVideo();
        } else if (e.key === "ArrowRight") {
          await playNextVideo();
        }
      });
    </script>
  </body>
</html>
