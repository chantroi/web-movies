<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ filename }}</title>
    <style>
      body,
      html {
        height: 100%;
        margin: 0;
        background: black;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #videoContainer {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #videoPlayer {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }
    </style>
  </head>
  <body>
    <div id="videoContainer">
      <video id="videoPlayer" controls autoplay>
        <p>Your browser doesn't support video playback.</p>
      </video>
    </div>
    <script type="module">
      import { Deta } from "https://cdn.deta.space/js/deta@latest/deta.mjs";
      const deta = Deta("{{ deta_key }}");
      const drive = deta.Drive("{{ drive }}");
      let currentVideo = "{{ filename }}";
      let nextVideo = "{{ next_file }}";
      let preVideo = "{{ pre_file }}";
      let videoCache = {};

      async function fetchVideo(filename) {
        if (!videoCache[filename]) {
          try {
            const response = await drive.get(filename);
            const blob = new Blob([response]);
            videoCache[filename] = URL.createObjectURL(blob);
          } catch (error) {
            console.error("Error fetching video:", filename, error);
          }
        }
        return videoCache[filename];
      }

      async function initVideo(filename) {
        try {
          const videoUrl = await fetchVideo(filename);
          const video = document.getElementById("videoPlayer");
          video.src = videoUrl;
          video.play();
          video.addEventListener("loadedmetadata", adjustVideoSize);
          window.addEventListener("resize", adjustVideoSize);
        } catch (error) {
          console.error("Error:", error);
        }
      }

      function adjustVideoSize() {
        const video = document.getElementById("videoPlayer");
        const { innerHeight: h, innerWidth: w } = window;
        const ratio = video.videoWidth / video.videoHeight;
        video.style.height = video.videoHeight > h ? h + "px" : "auto";
        video.style.width = video.videoWidth > w ? w + "px" : "auto";
      }

      async function renewVideo(filename) {
        const response = await fetch(`/{{ drive }}/${filename}?renew=true`);
        const data = await response.json();
        currentVideo = filename;
        nextVideo = data.next;
        preVideo = data.pre;

        // Preload next and previous videos
        if (nextVideo) fetchVideo(nextVideo);
        if (preVideo) fetchVideo(preVideo);
      }

      async function playNextVideo() {
        if (nextVideo) {
          await initVideo(nextVideo);
          renewVideo(nextVideo);
        }
      }

      initVideo(currentVideo);
      renewVideo(currentVideo); // Initial preloading

      const video = document.getElementById("videoPlayer");
      video.addEventListener("ended", playNextVideo);

      let touchStart;
      document.addEventListener(
        "touchstart",
        (e) => (touchStart = e.changedTouches[0].screenX)
      );
      document.addEventListener("touchend", async (e) => {
        const touchEnd = e.changedTouches[0].screenX;
        if (touchEnd < touchStart) {
          await playNextVideo();
        } else if (touchEnd > touchStart) {
          if (preVideo) {
            await initVideo(preVideo);
            renewVideo(preVideo);
          }
        }
      });

      document.addEventListener("keydown", async (e) => {
        if (e.key === "ArrowLeft") {
          if (preVideo) {
            await initVideo(preVideo);
            renewVideo(preVideo);
          }
        } else if (e.key === "ArrowRight") {
          await playNextVideo();
        }
      });
    </script>
  </body>
</html>
