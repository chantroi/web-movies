<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ filename }}</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
        background-color: black;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #videoContainer {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #videoWrapper {
        max-width: 100%;
        max-height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #videoPlayer {
        max-width: 100%;
        max-height: 100%;
        width: auto;
        height: auto;
      }
    </style>
  </head>
  <body>
    <div id="videoContainer">
      <div id="videoWrapper">
        <video id="videoPlayer" controls autoplay>
          <p>Your browser doesn't support video playback.</p>
        </video>
      </div>
    </div>
    <script type="module">
      import { Deta } from "https://cdn.deta.space/js/deta@latest/deta.mjs";
      const deta = Deta("{{ deta_key }}");
      async function downloadAndPlayVideo() {
        const drive = deta.Drive("files");
        const fileId = "{{ filename }}";
        try {
          const response = await drive.get(fileId);
          const fileBlob = new Blob([response]);
          const videoUrl = URL.createObjectURL(fileBlob);
          const videoElement = document.getElementById("videoPlayer");
          videoElement.src = videoUrl;
          videoElement.play();
        } catch (error) {
          console.error("Error:", error);
        }
      }
      downloadAndPlayVideo();
    </script>
  </body>
</html>
