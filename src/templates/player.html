<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ filename }}</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: black;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }
      #videoContainer {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #videoPlayer {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
    </style>
  </head>
  <body>
    <div id="videoContainer">
      <video id="videoPlayer" controls>
        <p>Your browser doesn't support video playback.</p>
      </video>
    </div>
    <script type="module">
      import { Deta } from "https://cdn.deta.space/js/deta@latest/deta.mjs";
      const deta = Deta("{{ deta_key }}");

      async function downloadAndPlayVideo() {
        const drive = deta.Drive("files");
        const fileId = "{{ filename }}";
        try {
          const response = await drive.get(fileId);
          const fileBlob = new Blob([response]);
          const videoUrl = URL.createObjectURL(fileBlob);
          const videoElement = document.getElementById("videoPlayer");
          videoElement.src = videoUrl;

          // Tự động phát và chuyển sang chế độ toàn màn hình
          videoElement
            .play()
            .then(() => {
              if (videoElement.requestFullscreen) {
                videoElement.requestFullscreen();
              } else if (videoElement.mozRequestFullScreen) {
                // Firefox
                videoElement.mozRequestFullScreen();
              } else if (videoElement.webkitRequestFullscreen) {
                // Chrome, Safari and Opera
                videoElement.webkitRequestFullscreen();
              } else if (videoElement.msRequestFullscreen) {
                // IE/Edge
                videoElement.msRequestFullscreen();
              }
            })
            .catch((error) => {
              console.error("Autoplay or fullscreen error:", error);
            });
        } catch (error) {
          console.error("Error:", error);
        }
      }

      // Thêm event listener để đảm bảo mã chạy sau khi DOM đã tải xong
      document.addEventListener("DOMContentLoaded", (event) => {
        downloadAndPlayVideo();
      });
    </script>
  </body>
</html>
