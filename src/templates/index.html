<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Collection</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <ul class="list-group">
      {% for file in files %}
      <li
        class="list-group-item d-flex justify-content-between align-items-center active"
      >
        <a href="{{ api_url }}/download?name={{ file }}" class="badge bg-primary"
          >{{ file }}</a
        >
      </li>
      {% endfor %}
    </ul>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1B0Q8iW+zx3lQrgXn/l7m4Gtl0+nP"
      crossorigin="anonymous"
    ></script>
    <script>
      self.addEventListener("fetch", (event) => {
        let req = event.request.clone();
        let headers = new Headers();
        headers.append("X-API-Key", "{{ deta_key}}");
        let modifiedReq = new Request(req, {
          headers: headers,
          mode: "cors",
          credentials: "include",
        });
        event.respondWith(fetch(modifiedReq));
      });
    </script>
  </body>
</html>
