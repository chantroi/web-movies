<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      const headers = new Headers();
      headers.append("X-API-Key", "{{ deta_key }}");

      fetch("{{ res_url }}", {
        method: "GET",
        headers: headers,
      })
        .then((response) => {
          window.location.href = response.url;
        })
        .catch((error) => {
          console.error(error);
        });
    </script>
  </head>

  <body>
    <p>Redirecting...</p>
  </body>
</html>
