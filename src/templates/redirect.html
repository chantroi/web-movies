<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>

        const url = '{{ res_url }}';
        const headers = {
            'X-API-Key': '{{ deta_key }}'
        };

        const request = new Request(url, {
            method: 'GET',
            headers: headers
        });

        window.location.href = request.url;
    </script>
</head>

<body>
    <p>Redirecting...</p>
</body>

</html>
