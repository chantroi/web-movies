<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ filename }}</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
        background-color: black;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #videoContainer {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #videoWrapper {
        max-width: 100%;
        max-height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #videoPlayer {
        max-width: 100%;
        max-height: 100%;
        width: auto;
        height: auto;
        object-fit: contain;
      }
    </style>
  </head>
  <body>
    <div id="videoContainer">
      <div id="videoWrapper">
        <video id="videoPlayer" controls autoplay>
          <p>Your browser doesn't support video playback.</p>
        </video>
      </div>
    </div>
    <script type="module">
      import { Deta } from "https://cdn.deta.space/js/deta@latest/deta.mjs";
      const deta = Deta("{{ deta_key }}");

      async function downloadAndPlayVideo() {
        const drive = deta.Drive("{{ drive }}");
        const fileId = "{{ filename }}";
        try {
          const response = await drive.get(fileId);
          const fileBlob = new Blob([response]);
          const videoUrl = URL.createObjectURL(fileBlob);
          const videoElement = document.getElementById("videoPlayer");
          videoElement.src = videoUrl;
          videoElement.play();
          videoElement.addEventListener("loadedmetadata", adjustVideoSize);
          window.addEventListener("resize", adjustVideoSize);
        } catch (error) {
          console.error("Error:", error);
        }
      }

      function adjustVideoSize() {
        const videoElement = document.getElementById("videoPlayer");
        const windowHeight = window.innerHeight;
        const windowWidth = window.innerWidth;
        const videoAspectRatio =
          videoElement.videoWidth / videoElement.videoHeight;

        if (videoElement.videoHeight > windowHeight) {
          videoElement.style.height = windowHeight + "px";
          videoElement.style.width = windowHeight * videoAspectRatio + "px";
        } else if (videoElement.videoWidth > windowWidth) {
          videoElement.style.width = windowWidth + "px";
          videoElement.style.height = windowWidth / videoAspectRatio + "px";
        } else {
          videoElement.style.width = videoElement.videoWidth + "px";
          videoElement.style.height = videoElement.videoHeight + "px";
        }
      }

      downloadAndPlayVideo();
    </script>
    <script>
      let touchstartX = 0;
      let touchendX = 0;

      function checkDirection() {
        if (touchendX < touchstartX) {
          // {% if next_file %}
          window.location.replace("/{{ drive }}/{{ next_file }}");
          // {% endif %}
        }
        if (touchendX > touchstartX) {
          // {% if pre_file %}
          window.location.replace("/{{ drive }}/{{ pre_file }}");
          // {% endif %}
        }
        touchstartX = 0;
        touchendX = 0;
      }

      document.addEventListener("touchstart", (e) => {
        touchstartX = e.changedTouches[0].screenX;
      });

      document.addEventListener("touchend", (e) => {
        touchendX = e.changedTouches[0].screenX;
        checkDirection();
      });

      document.addEventListener("keydown", function (event) {
        if (event.key === "ArrowLeft") {
          // {% if pre_file %}
          window.location.replace("/{{ drive }}/{{ pre_file }}");
          // {% endif %}
        } else if (event.key === "ArrowRight") {
          // {% if next_file %}
          window.location.replace("/{{ drive }}/{{ next_file }}");
          // {% endif %}
        }
      });
    </script>
  </body>
</html>
